name: Update News Data

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-news-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Run automated tests
        run: python -m pytest -q -c development/pytest.ini development/tests

      - name: Refresh most recent news day
        env:
          TRANSLATION_PROVIDER: ${{ vars.TRANSLATION_PROVIDER || 'none' }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          DEEPL_API_URL: ${{ vars.DEEPL_API_URL || 'https://api-free.deepl.com/v2/translate' }}
        run: python -m scripts.aggregate_news --latest-only

      - name: Validate generated output
        run: python -m scripts.validate_output

      - name: Commit changed data
        run: |
          if git diff --quiet -- data; then
            echo "No generated data changes to commit."
            exit 0
          fi
          git config user.name "worldline-news-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "data: refresh generated news archive"
          git push
